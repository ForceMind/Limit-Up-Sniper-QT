<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>涨停狙击手后台</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    [v-cloak] { display: none; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; max-width: 100%; overflow-x: hidden; }
    body { letter-spacing: 0; font-family: Arial, "Microsoft YaHei", sans-serif; max-width: 100%; overflow-x: hidden; }
    input, select, button { max-width: 100%; }
    *, *::before, *::after { box-sizing: border-box; }
    #app, .app-shell, .main-content, .panel, section { max-width: 100%; min-width: 0; }
    .panel { border: 1px solid #d6d9de; background: #fff; border-radius: 6px; }
    .metric { border: 1px solid #d6d9de; background: #fff; border-radius: 6px; padding: 12px; min-height: 78px; }
    .table-wrap { scrollbar-width: thin; overflow-x: auto; max-width: 100%; min-width: 0; }
    .table-wrap table { min-width: 760px; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .log-window { height: calc(100vh - 178px); min-height: 520px; scrollbar-width: thin; }
    .tab-button { border-radius: 6px; }
    .tab-button.active { background: #111827; color: #fff; }
    .trade-view-button { border-radius: 4px; background: #fff; color: #111827; }
    .trade-view-button:hover { background: #f5f5f5; }
    .trade-view-button.active,
    .trade-view-button.active:hover {
      background: #111827 !important;
      border-color: #111827 !important;
      color: #fff !important;
    }
    @media (max-width: 1279px) {
      .app-shell { display: block !important; }
      .sidebar { position: sticky; top: 0; z-index: 40; border-right: 0; border-bottom: 1px solid #d6d9de; padding: 12px; }
      .sidebar-brand { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
      .nav-menu { display: flex !important; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
      .nav-menu::-webkit-scrollbar { display: none; }
      .nav-menu .tab-button { flex: 0 0 auto; height: 36px; white-space: nowrap; padding-left: 12px; padding-right: 12px; }
      .sidebar-status { display: grid !important; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb; }
      .sidebar-status > :not([hidden]) ~ :not([hidden]) { margin-top: 0 !important; }
      .sidebar-status > div { border: 1px solid #e5e7eb; background: #f8fafc; border-radius: 6px; padding: 8px; }
      .sidebar-status > a { grid-column: 1 / -1; }
      .main-content { padding: 12px; }
      .log-panel { border-left: 0; border-top: 1px solid #1f2937; }
      .log-window { height: 420px; min-height: 420px; }
    }
    @media (max-width: 767px) {
      .sidebar { padding: 10px 12px; }
      .sidebar-brand { margin-bottom: 8px; }
      .sidebar-title { font-size: 18px; line-height: 24px; }
      .sidebar-subtitle { font-size: 11px; }
      .sidebar-status { grid-template-columns: repeat(2, minmax(0, 1fr)); font-size: 11px; }
      .sidebar-status > div:nth-child(3) { grid-column: 1 / -1; }
      .main-content { padding: 10px; }
      .mobile-header { padding: 12px; }
      .mobile-title { font-size: 20px; line-height: 26px; }
      .top-actions { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
      .top-actions input { grid-column: 1 / -1; width: 100%; }
      .top-actions button, .top-actions label { width: 100%; justify-content: center; }
      .metric { min-height: 72px; padding: 10px; }
      .job-row { grid-template-columns: 1fr !important; padding: 12px; }
      .job-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
      .log-panel { padding: 12px; }
      .log-filters { grid-template-columns: 1fr; }
      .log-window { height: 340px; min-height: 340px; }
    }
    @media (max-width: 420px) {
      .metric { min-height: 68px; }
      .metric .text-lg { font-size: 16px; line-height: 22px; }
      .table-wrap table { min-width: 680px; }
    }
  </style>
</head>
<body class="bg-[#f4f6f8] text-neutral-900 min-h-screen">
  <div id="app" v-cloak class="min-h-screen">
    <div v-if="authReady && !auth.token" class="min-h-screen flex items-center justify-center bg-[#f4f6f8] p-4">
      <form v-if="auth.setupRequired" @submit.prevent="setupAuth" class="w-full max-w-xl bg-white border border-neutral-300 p-5 space-y-4">
        <div>
          <h1 class="text-xl font-semibold">首次初始化</h1>
          <p class="mt-1 text-sm text-neutral-500">服务器还没有账号。这里会同时创建后台管理员账号和前台交易终端账号。</p>
        </div>
        <div class="grid gap-3 md:grid-cols-2">
          <label class="block text-sm">
            <span class="block text-xs text-neutral-500 mb-1">后台用户名</span>
            <input v-model="setupForm.admin_username" autocomplete="username" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
          </label>
          <label class="block text-sm">
            <span class="block text-xs text-neutral-500 mb-1">后台密码</span>
            <input v-model="setupForm.admin_password" type="password" autocomplete="new-password" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
          </label>
          <label class="block text-sm">
            <span class="block text-xs text-neutral-500 mb-1">前台用户名</span>
            <input v-model="setupForm.frontend_username" autocomplete="username" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
          </label>
          <label class="block text-sm">
            <span class="block text-xs text-neutral-500 mb-1">前台密码</span>
            <input v-model="setupForm.frontend_password" type="password" autocomplete="new-password" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
          </label>
        </div>
        <div class="text-xs text-neutral-500">密码至少 8 位。认证文件保存在服务器本地 `backend/data/auth.json`，不会提交到 Git。</div>
        <div v-if="auth.error" class="text-sm text-red-700">{{ auth.error }}</div>
        <button type="submit" :disabled="auth.loading" class="w-full h-10 bg-neutral-900 text-white text-sm disabled:opacity-50">{{ auth.loading ? '初始化中' : '创建账号并进入后台' }}</button>
      </form>

      <form v-else @submit.prevent="loginAdmin" class="w-full max-w-sm bg-white border border-neutral-300 p-5 space-y-4">
        <div>
          <h1 class="text-xl font-semibold">后台登录</h1>
          <p class="mt-1 text-sm text-neutral-500">后台账号可以修改配置、触发同步、运行 AI 和执行运维操作。</p>
        </div>
        <label class="block text-sm">
          <span class="block text-xs text-neutral-500 mb-1">用户名</span>
          <input v-model="auth.username" autocomplete="username" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
        </label>
        <label class="block text-sm">
          <span class="block text-xs text-neutral-500 mb-1">密码</span>
          <input v-model="auth.password" type="password" autocomplete="current-password" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
        </label>
        <div v-if="auth.error" class="text-sm text-red-700">{{ auth.error }}</div>
        <button type="submit" :disabled="auth.loading" class="w-full h-10 bg-neutral-900 text-white text-sm disabled:opacity-50">{{ auth.loading ? '登录中' : '登录后台' }}</button>
      </form>
    </div>
    <div v-else-if="!authReady" class="min-h-screen flex items-center justify-center bg-[#f4f6f8] text-sm text-neutral-500">正在检查登录状态...</div>
    <template v-else>
    <div class="app-shell grid min-h-screen xl:grid-cols-[220px_minmax(0,1fr)_390px]">
      <aside class="sidebar bg-white border-r border-neutral-200 p-4 xl:sticky xl:top-0 xl:h-screen">
        <div class="sidebar-brand mb-5">
          <div>
            <div class="sidebar-title text-lg font-semibold">涨停狙击手</div>
            <div class="sidebar-subtitle text-xs text-neutral-500 mt-1">动态量化后台</div>
          </div>
        </div>
        <nav class="nav-menu grid gap-1">
          <button
            v-for="tab in tabs"
            :key="tab.key"
            @click="activeTab = tab.key"
            class="tab-button h-10 px-3 text-left text-sm hover:bg-neutral-100"
            :class="{ active: activeTab === tab.key }"
          >{{ tab.label }}</button>
        </nav>
        <div class="sidebar-status mt-5 pt-4 border-t border-neutral-200 text-xs space-y-2">
          <div class="flex items-center justify-between gap-2">
            <span class="text-neutral-500">调度器</span>
            <span class="font-semibold" :class="scheduler.enabled ? 'text-emerald-700' : 'text-neutral-500'">{{ scheduler.status || '-' }}</span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-neutral-500">交易时段</span>
            <span class="font-semibold" :class="scheduler.market_open ? 'text-red-600' : 'text-neutral-500'">{{ scheduler.market_open ? '开盘' : '休市' }}</span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-neutral-500">AI模型</span>
            <span class="font-semibold truncate max-w-[110px]">{{ status.ai_model || '-' }}</span>
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-neutral-500">版本</span>
            <span class="font-semibold truncate max-w-[110px]">v{{ appVersion }}</span>
          </div>
          <a href="/" class="block h-9 leading-9 text-center border border-neutral-300 bg-white text-sm hover:bg-neutral-50">前台买入列表</a>
          <button @click="logout" class="block w-full h-9 border border-neutral-300 bg-white text-sm hover:bg-neutral-50">退出后台</button>
        </div>
      </aside>

      <main class="main-content min-w-0 p-4 space-y-4">
        <header class="mobile-header panel p-4">
          <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
            <div>
              <h1 class="mobile-title text-xl font-semibold">系统控制台</h1>
              <div class="text-xs text-neutral-500 mt-1">
                服务器时间 {{ status.current_time || '-' }} · 数据日期 {{ status.data_date || '-' }} · 最新新闻 {{ status.latest_news_time || '-' }}
              </div>
            </div>
            <div class="top-actions flex flex-wrap items-center gap-2">
              <input v-model="asOf" @change="refreshAll" type="date" class="h-9 px-3 border border-neutral-300 bg-white text-sm outline-none focus:border-neutral-900">
              <button @click="refreshAll" :disabled="loading" class="h-9 px-3 bg-neutral-900 text-white text-sm disabled:opacity-50">{{ loading ? '刷新中' : '刷新' }}</button>
              <label class="inline-flex h-9 items-center gap-2 px-3 border border-neutral-300 bg-white text-sm">
                <input v-model="autoRefresh" type="checkbox" class="accent-neutral-900">
                自动刷新
              </label>
            </div>
          </div>
          <div v-if="clientError" class="mt-3 text-sm text-red-700">{{ clientError }}</div>
        </header>

        <section v-if="activeTab === 'overview'" class="space-y-4">
          <div class="grid grid-cols-2 md:grid-cols-4 2xl:grid-cols-10 gap-3">
            <div class="metric">
              <div class="text-xs text-neutral-500">分析日期</div>
              <div class="mt-2 text-lg font-semibold">{{ dashboard.as_of || asOf || '-' }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">新闻 / AI</div>
              <div class="mt-2 text-lg font-semibold">{{ newsCount }} / {{ aiRecordCount }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">事件 / 股票</div>
              <div class="mt-2 text-lg font-semibold">{{ eventCount }} / {{ stockCount }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">今日买入候选</div>
              <div class="mt-2 text-lg font-semibold text-red-600">{{ buyList.length }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">全周期收益</div>
              <div class="mt-2 text-lg font-semibold" :class="numClass(timeline.return_pct)">{{ pct(timeline.return_pct) }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">胜率 / 交易</div>
              <div class="mt-2 text-lg font-semibold">{{ pct(timeline.win_rate) }} / {{ timeline.closed_trades || 0 }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">分时缓存</div>
              <div class="mt-2 text-lg font-semibold">{{ minuteCacheCount }}</div>
            </div>
            <div class="metric">
              <div class="text-xs text-neutral-500">账户收益</div>
              <div class="mt-2 text-lg font-semibold" :class="numClass(account.return_pct)">{{ pct(account.return_pct) }}</div>
            </div>
          </div>

          <div class="panel">
            <div class="px-4 py-3 border-b border-neutral-200 flex items-center justify-between">
              <div class="font-semibold">自动链路</div>
              <div class="text-xs text-neutral-500">上次心跳 {{ shortTime(scheduler.last_tick_at) }}</div>
            </div>
            <div class="divide-y divide-neutral-100">
              <div v-for="job in jobCards" :key="job.key" class="job-row p-4 grid gap-3 lg:grid-cols-[170px_1fr_minmax(220px,340px)_130px] lg:items-center">
                <div>
                  <div class="font-semibold">{{ job.label }}</div>
                  <div class="text-xs text-neutral-500 mt-1">{{ job.desc }}</div>
                </div>
                <div class="job-metrics grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                  <div>
                    <div class="text-xs text-neutral-500">状态</div>
                    <span class="inline-flex mt-1 px-2 py-1 text-xs rounded-md" :class="statusPillClass(jobState(job.key).status)">
                      {{ jobStatusText(jobState(job.key).status) }}
                    </span>
                    <div class="mt-1 text-xs text-neutral-500">{{ jobStatusHint(job.key) }}</div>
                  </div>
                  <div>
                    <div class="text-xs text-neutral-500">开始</div>
                    <div class="font-semibold mt-1">{{ shortTime(jobState(job.key).last_started_at) }}</div>
                  </div>
                  <div>
                    <div class="text-xs text-neutral-500">结束</div>
                    <div class="font-semibold mt-1">{{ shortTime(jobState(job.key).last_finished_at) }}</div>
                  </div>
                  <div>
                    <div class="text-xs text-neutral-500">耗时</div>
                    <div class="font-semibold mt-1">{{ fixed(jobState(job.key).duration_ms, 0) }} ms</div>
                  </div>
                </div>
                <div class="text-sm text-neutral-700">
                  <div class="flex items-center justify-between gap-2">
                    <span>{{ jobSummary(job.key) }}</span>
                    <span class="text-xs text-neutral-500">{{ jobProgress(job.key) }}%</span>
                  </div>
                  <div class="mt-2 h-2 bg-neutral-100 overflow-hidden">
                    <div class="h-full bg-red-600 transition-all" :style="{ width: jobProgress(job.key) + '%' }"></div>
                  </div>
                  <div class="mt-1 text-xs text-neutral-500">{{ jobState(job.key).progress_message || '' }}</div>
                </div>
                <div class="flex flex-wrap gap-2 lg:justify-end">
                  <button v-if="isJobRunning(job.key)" @click="stopJob(job.key)" class="h-8 px-3 bg-white border border-red-300 text-red-700 text-xs hover:bg-red-50">停止当前</button>
                  <button v-if="isJobRunning(job.key) || isJobPaused(job.key)" @click="pauseOrResumeJob(job.key)" class="h-8 px-3 bg-white border border-neutral-300 text-xs hover:bg-neutral-50">{{ jobActionText(job.key, '暂停后续') }}</button>
                </div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 2xl:grid-cols-[1fr_1fr] gap-4">
            <div class="panel">
              <div class="px-4 py-3 border-b border-neutral-200 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                  <div class="font-semibold">自动调度器</div>
                  <div class="text-xs text-neutral-500 mt-1">{{ schedulerSummary }}</div>
                </div>
                <div class="flex flex-wrap gap-2">
                  <button @click="startScheduler" :disabled="schedulerWorking || scheduler.enabled" class="h-8 px-3 bg-neutral-900 text-white text-xs disabled:opacity-50">启动自动调度</button>
                  <button @click="stopScheduler" :disabled="schedulerWorking || !scheduler.enabled" class="h-8 px-3 bg-white border border-neutral-300 text-xs disabled:opacity-50">停止自动调度</button>
                </div>
              </div>
              <div class="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <div><div class="text-xs text-neutral-500">当前状态</div><div class="font-semibold mt-1">{{ schedulerStatusText }}</div></div>
                <div><div class="text-xs text-neutral-500">新闻抓取</div><div class="font-semibold mt-1">{{ shortTime(scheduler.next_news_fetch_at) }}</div></div>
                <div><div class="text-xs text-neutral-500">AI分析</div><div class="font-semibold mt-1">{{ shortTime(scheduler.next_ai_analysis_at) }}</div></div>
                <div><div class="text-xs text-neutral-500">行情同步</div><div class="font-semibold mt-1">{{ shortTime(scheduler.next_market_sync_at) }}</div></div>
                <div><div class="text-xs text-neutral-500">交易循环</div><div class="font-semibold mt-1">{{ shortTime(scheduler.next_trade_cycle_at) }}</div></div>
                <div><div class="text-xs text-neutral-500">策略复盘</div><div class="font-semibold mt-1">{{ shortTime(scheduler.next_strategy_replay_at) }}</div></div>
              </div>
            </div>
            <div class="panel">
              <div class="px-4 py-3 border-b border-neutral-200 font-semibold">当前账户</div>
              <div class="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <div><div class="text-xs text-neutral-500">总资产</div><div class="font-semibold mt-1">{{ money(account.total_asset) }}</div></div>
                <div><div class="text-xs text-neutral-500">可用现金</div><div class="font-semibold mt-1">{{ money(account.available_cash) }}</div></div>
                <div><div class="text-xs text-neutral-500">市值</div><div class="font-semibold mt-1">{{ money(account.market_value) }}</div></div>
                <div><div class="text-xs text-neutral-500">持仓</div><div class="font-semibold mt-1">{{ account.position_count || 0 }}</div></div>
              </div>
            </div>
          </div>
        </section>

        <section v-if="activeTab === 'signals'" class="space-y-4">
          <div class="panel">
            <div class="px-4 py-3 border-b border-neutral-200 flex flex-col gap-3 xl:flex-row xl:items-end xl:justify-between">
              <div>
                <div class="font-semibold">不同模型买入信号</div>
                <div class="text-xs text-neutral-500 mt-1">先选择一个策略，下面只展示该策略的买入信号；全局新闻单独在下方展示</div>
              </div>
              <div class="flex flex-col gap-2 sm:flex-row sm:items-end">
                <label class="block text-sm min-w-[260px]">
                  <span class="block text-xs text-neutral-500 mb-1">策略筛选</span>
                  <select v-model="signalForm.model_id" class="w-full h-9 px-3 border border-neutral-300 bg-white text-sm">
                    <option v-for="group in modelSignalGroups" :key="'signal-filter-' + group.model_id" :value="group.model_id">{{ group.model_name || group.model_id }}</option>
                  </select>
                </label>
                <div class="text-xs text-neutral-500 sm:text-right">
                  <div>信号日期 {{ modelSignalDate || '-' }}</div>
                  <div v-if="modelSignals.fallback_latest">已自动切到最近有信号日期</div>
                </div>
              </div>
            </div>
            <div class="table-wrap overflow-auto max-h-[520px]">
              <table class="w-full text-sm">
                <thead class="sticky top-0 bg-neutral-50 border-b border-neutral-200 text-xs text-neutral-500">
                  <tr>
                    <th class="px-3 py-2 text-left min-w-[180px]">策略模型</th>
                    <th class="px-3 py-2 text-left">股票</th>
                    <th class="px-3 py-2 text-left">信号 / 执行</th>
                    <th class="px-3 py-2 text-right">买入评分</th>
                    <th class="px-3 py-2 text-right">卖出评分</th>
                    <th class="px-3 py-2 text-left min-w-[360px]">模型理由</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-neutral-100">
                  <tr v-for="item in modelSignalRows" :key="item.row_key" class="hover:bg-neutral-50">
                    <td class="px-3 py-2">
                      <div class="font-semibold">{{ item.model_name || item.model_id }}</div>
                      <div class="text-xs text-neutral-500">{{ item.model_id }} · {{ money(item.initial_cash) }}</div>
                      <div class="text-xs text-neutral-500">收益 {{ fixed(item.return_pct) }}% · 信号 {{ item.model_signal_count || 0 }}</div>
                    </td>
                    <td class="px-3 py-2 font-semibold">{{ item.name }} <span class="text-xs text-neutral-500">{{ item.code }}</span></td>
                    <td class="px-3 py-2">
                      <span class="px-2 py-1 rounded-md text-xs" :class="actionClass(item.action)">{{ item.action || '买入候选' }}</span>
                      <div class="text-xs text-neutral-500 mt-1">{{ item.date || '-' }} → {{ item.execute_on || '-' }}</div>
                    </td>
                    <td class="px-3 py-2 text-right text-red-600 font-semibold">{{ fixed(item.buy_score) }}</td>
                    <td class="px-3 py-2 text-right text-green-700 font-semibold">{{ fixed(item.sell_score) }}</td>
                    <td class="px-3 py-2">
                      <div class="mt-1 line-clamp-2">{{ item.reason || '-' }}</div>
                    </td>

      methods: {
        fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
          const controller = new AbortController();
          const timer = window.setTimeout(() => controller.abort(), timeoutMs);
          return fetch(url, { ...options, signal: controller.signal }).finally(() => window.clearTimeout(timer));
        },
        async api(url, options = {}) {
          const headers = new Headers(options.headers || {});
          if (this.auth.token) headers.set('Authorization', `Bearer ${this.auth.token}`);
          const res = await fetch(url, { ...options, headers });
          if (!res.ok) {
            const text = await res.text();
            if (res.status === 401 || res.status === 403) {
              this.auth.token = '';
              localStorage.removeItem('qt_admin_token');
              this.stopTimers();
            }
            let message = text || `HTTP ${res.status}`;
            if (res.status === 524) {
              message = 'Cloudflare 等待源站超时：服务器首屏接口或后台任务执行太久。系统已改为轻量首屏，当前模块请稍后重试。';
            } else if (res.status === 504) {
              message = 'Nginx 等待后端超时：当前版本会把重任务转入后台运行；如果仍反复出现，请部署最新代码并重启后端，再查看任务日志。';
            } else if (res.status === 413) {
              message = '请求被 Nginx 拒绝：数据太大。请在服务器执行 qt nginx-upload 后重试。';
            }
            const error = new Error(message);
            error.status = res.status;
            error.body = text;
            throw error;
          }
          return await res.json();
        },
        userAccountDiagnostic(user) {
          return ((user || {}).account_diagnostic || {});
        },
        userAccountSnapshot(user) {
          return this.userAccountDiagnostic(user).account_snapshot || {};
        },
        userDiagnosticPositions(user) {
          const rows = this.userAccountDiagnostic(user).positions || [];
          return Array.isArray(rows) ? rows : [];
        },
        userDiagnosticTrades(user) {
          const rows = this.userAccountDiagnostic(user).recent_trades || [];
          return Array.isArray(rows) ? rows : [];
        },
        userAccountText(user) {
          const snapshot = this.userAccountSnapshot(user);
          if (!snapshot || !snapshot.snapshot_id) return '未生成';
          return `${this.money(snapshot.total_asset)} / ${this.pct(snapshot.return_pct)}`;
        },
        userAccountMeta(user) {
          const snapshot = this.userAccountSnapshot(user);

            const period = (user || {}).follow_period || {};
            return period.start_date ? `周期 ${period.start_date}` : '等待前台账户刷新';
          }
          const pos = Number(snapshot.position_count || 0);

          return `${snapshot.as_of || '-'} · 持仓 ${pos} · 成交 ${deals}`;
        },
        async initAuth() {

            if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
            const status = await res.json();

            shouldLoadAdmin = Boolean(this.auth.token);
          } catch (err) {
            this.auth.error = String(err.message || err);
            this.auth.token = '';
            localStorage.removeItem('qt_admin_token');
          } finally {
            this.authReady = true;

        stopTimers() {
          if (this.refreshTimer) window.clearInterval(this.refreshTimer);
          if (this.logTimer) window.clearInterval(this.logTimer);
          if (this.liveReconnectTimer) window.clearTimeout(this.liveReconnectTimer);
          if (this.detailRefreshTimer) window.clearTimeout(this.detailRefreshTimer);
          if (this.liveSocket) this.liveSocket.close();
          this.refreshTimer = null;

          this.liveReconnectTimer = null;
          this.detailRefreshTimer = null;
          this.liveSocket = null;
          this.liveConnected = false;
        },
        startLive() {
          if (!this.auth.token || this.liveSocket) return;
          const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
          const url = `${scheme}://${window.location.host}/ws/admin/live`;
          const socket = new WebSocket(url);
          this.liveSocket = socket;
          socket.onopen = () => {
            this.liveConnected = true;
            this.liveReconnectDelay = 1000;
            socket.send(JSON.stringify({ type: 'auth', token: this.auth.token }));
          };
          socket.onmessage = event => {
            try {
              this.applyLiveMessage(JSON.parse(event.data || '{}'));
            } catch (err) {
              this.clientError = String(err.message || err);
            }
          };
          socket.onclose = () => {
            if (this.liveSocket === socket) this.liveSocket = null;
            this.liveConnected = false;
            if (this.auth.token && !this.liveReconnectTimer) {
              const delay = this.liveReconnectDelay;
              this.liveReconnectDelay = Math.min(this.liveReconnectDelay * 1.6, 15000);
              this.liveReconnectTimer = window.setTimeout(() => {
                this.liveReconnectTimer = null;
                this.startLive();
              }, delay);
            }
          };
          socket.onerror = () => {
            this.liveConnected = false;
          };
        },
        applyLiveMessage(message) {
          if (!message || message.type !== 'live_delta') return;
          if (message.status_payload) this.status = message.status_payload;
          if (message.jobs) this.jobStatus = message.jobs;
          if (message.biying) this.biyingStatus = message.biying;
          if (Array.isArray(message.logs_delta) && message.logs_delta.length) {
            this.mergeLogDelta(message.logs_delta);
            this.logUpdatedAt = this.nowChinaShort();
            if (message.logs_delta.some(item => ['finish', 'error'].includes(String(item.stage || '')))) {

        mergeLogDelta(items) {
          const seen = new Set(this.logs.map(item => this.logKey(item)));
          for (const item of items) {
            if (!this.logMatchesFilter(item)) continue;
            const key = this.logKey(item);
            if (seen.has(key)) continue;
            this.logs.unshift(item);
            seen.add(key);
          }
          this.logs = this.logs.slice(0, 220);
        },
        logKey(item) {
          return ['ts', 'job', 'stage', 'level', 'message'].map(key => String((item || {})[key] || '')).join('|');
        },
        logMatchesFilter(item) {
          if (this.logJob && String((item || {}).job || '') !== this.logJob) return false;
          if (this.logLevel && String((item || {}).level || '').toLowerCase() !== this.logLevel) return false;
          return true;

          this.biyingStatus = snapshot.biying || this.biyingStatus;

        async downloadDataPackage() {

          try {
            const headers = new Headers();
            if (this.auth.token) headers.set('Authorization', `Bearer ${this.auth.token}`);
            const res = await fetch('/api/admin/data/export', { headers });
            if (!res.ok) throw new Error(await res.text());
            const blob = await res.blob();
            const disposition = res.headers.get('content-disposition') || '';
            const match = disposition.match(/filename="?([^"]+)"?/i);
            const filename = match ? match[1] : `qt_safe_data_export_${Date.now()}.tar.gz`;
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            this.adminResult = { status: 'ok', message: '数据包已下载', filename, size_bytes: blob.size };
            if (!this.liveConnected) await this.fetchLogs();
          } catch (err) {
            this.clientError = String(err.message || err);
          } finally {
            this.downloadingData = false;

        startImportPolling(jobId) {

        },
        async pollDataImportJob(jobId) {
          if (!jobId) return;
          try {
            const result = await this.api(`/api/admin/data/import/${jobId}`);
            const job = result.job || {};
            this.importJob = { ...this.importJob, ...job };
            if (job.status === 'done' || job.status === 'failed') {
              this.stopImportPolling();
              this.uploadingData = false;
              this.adminResult = job.result || job;
              await this.refreshAll(true);
              if (!this.liveConnected) await this.fetchLogs();
            }
          } catch (err) {
            this.stopImportPolling();
            this.uploadingData = false;
            this.importJob = {
              ...this.importJob,
              status: 'failed',
              stage: 'failed',
              progress: 100,
              message: '读取合并进度失败',
              error: String(err.message || err),
            };
          }
        },
        uploadDataPackageRequest(file) {
          return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/admin/data/import?backup=true');
            xhr.setRequestHeader('Content-Type', 'application/gzip');
            if (this.auth.token) xhr.setRequestHeader('Authorization', `Bearer ${this.auth.token}`);
            xhr.upload.onprogress = (event) => {
              if (!event.lengthComputable) return;
              const uploadPct = Math.max(1, Math.min(14, Math.round((event.loaded / event.total) * 14)));
              this.importJob = {
                ...this.importJob,
                status: 'uploading',
                stage: 'uploading',
                progress: uploadPct,
                message: `正在上传数据包 ${uploadPct}%`,
                received_bytes: event.loaded,
              };
            };
            xhr.onload = () => {
              if (xhr.status >= 200 && xhr.status < 300) {
                try {
                  resolve(JSON.parse(xhr.responseText || '{}'));
                } catch (err) {
                  reject(new Error('服务器返回的导入任务响应不是 JSON'));
                }
              } else {
                if (xhr.status === 413) {
                  reject(new Error('上传被 Nginx 拒绝：请求体超过限制。请在服务器执行 qt nginx-upload 后重试。'));
                } else if (xhr.status === 504) {
                  reject(new Error('Nginx 等待后端超时：数据包可能太大或服务器正在合并数据。请在服务器执行 qt nginx-upload 修复等待超时，然后查看后台日志确认任务是否仍在运行。'));
                } else {
                  reject(new Error(xhr.responseText || `上传失败：HTTP ${xhr.status}`));
                }
              }
            };
            xhr.onerror = () => reject(new Error('上传请求失败，请检查服务器连接'));
            xhr.send(file);
          });
        },
        async uploadDataPackage(event) {
          const file = event?.target?.files?.[0];
          if (event?.target) event.target.value = '';
          if (!file) return;
          if (!window.confirm('导入前服务器会自动备份当前数据；上传包会按新闻、行情、事件等类型合并，不会直接覆盖服务器数据。确认继续吗？')) return;
          this.uploadingData = true;
          this.showImportDialog = true;
          this.importFileName = file.name;
          this.importJob = {
            status: 'uploading',
            stage: 'uploading',
            progress: 5,
            message: '正在上传数据包',
            received_bytes: file.size,
            logs: [{ ts: new Date().toISOString(), message: '正在上传数据包', stage: 'uploading' }],
          };
          try {
            const accepted = await this.uploadDataPackageRequest(file);
            this.importJob = {
              ...this.importJob,
              ...accepted,
              status: 'queued',
              stage: 'queued',
              progress: 15,
              message: accepted.message || '数据包已上传，后台正在合并',

        },
        ratioPct(value) {
          return `${this.fixed(Number(value || 0) * 100)}%`;
        },
        money(value) {
          const n = Number(value || 0);
          return Number.isFinite(n) ? n.toLocaleString('zh-CN', { maximumFractionDigits: 2 }) : '-';
        },
        formatBytes(value) {
          const n = Number(value || 0);
          if (!Number.isFinite(n) || n <= 0) return '-';
          if (n >= 1024 * 1024 * 1024) return `${(n / 1024 / 1024 / 1024).toFixed(2)} GB`;
          if (n >= 1024 * 1024) return `${(n / 1024 / 1024).toFixed(2)} MB`;
          if (n >= 1024) return `${(n / 1024).toFixed(2)} KB`;
          return `${n} B`;
        },
        qty(value) {
          const n = Number(value || 0);
          return Number.isFinite(n) ? n.toLocaleString('zh-CN', { maximumFractionDigits: 2 }) : '-';
        },
        shortTime(value) {
          const text = String(value || '');
          if (!text) return '-';
          return text.length >= 16 ? text.slice(5, 16).replace('T', ' ') : text;
        },
        numClass(value) {
          const n = Number(value || 0);
          if (n > 0) return 'text-red-600';
          if (n < 0) return 'text-green-700';
          return 'text-neutral-700';
        },
        compactJson(value) {
          try {
            return JSON.stringify(value || {}, null, 2);
          } catch (err) {
            return String(value || '');
          }
        },
        compactCell(value, maxLength = 160) {
          if (value === null || value === undefined || value === '') return '-';
          let text = '';
          if (typeof value === 'object') {
            try {
              text = JSON.stringify(value);
            } catch (err) {
              text = String(value);
            }
          } else {
            text = String(value);
          }
          return text.length > maxLength ? `${text.slice(0, maxLength)}...` : text;
        },
      },
    }).mount('#app');
  </script>
</body>
</html>
