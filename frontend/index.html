<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>涨停狙击手</title>
  <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    [v-cloak] { display: none; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; max-width: 100%; overflow-x: hidden; touch-action: pan-y; }
    body { letter-spacing: 0; max-width: 100%; overflow-x: hidden; }
    input, button { max-width: 100%; }
    *, *::before, *::after { box-sizing: border-box; }
    #app, .main-shell, .terminal-panel, .trade-grid, .trade-grid > *, section { max-width: 100%; min-width: 0; }
    .table-wrap { scrollbar-width: thin; overflow-x: auto; max-width: 100%; min-width: 0; }
    .table-wrap table { min-width: 760px; }
    .metric-card { min-height: 84px; }
    .terminal-panel { border: 1px solid #d4d4d8; background: #fff; }
    .mobile-only { display: none; }
    .compact-list { display: none; }
    .mobile-app { display: none; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @media (max-width: 767px) {
      body { background: #0d1119; }
      .desktop-shell { display: none !important; }
      .page-header { padding: 14px 16px; }
      .page-title { font-size: 20px; line-height: 26px; }
      .header-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
      .header-actions input { grid-column: 1 / -1; width: 100%; }
      .header-actions a, .header-actions button { width: 100%; justify-content: center; }
      .main-shell { padding: 12px; padding-bottom: 78px; }
      .main-shell > * { min-width: 0; max-width: 100%; }
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 10px; }
      .metric-card { min-height: 74px; padding: 10px; }
      .metric-card .text-lg { font-size: 16px; line-height: 22px; }
      .section-head { align-items: flex-start; gap: 8px; }
      .section-head > div:last-child { text-align: left; }
      .trade-grid { grid-template-columns: 1fr !important; }
      .table-wrap table { min-width: 700px; }
      .desktop-mobile-table { display: none !important; }
      .compact-list { display: block; }
      .compact-card { padding: 12px 14px; border-bottom: 1px solid #e5e7eb; }
      .compact-card:last-child { border-bottom: 0; }
      .compact-meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .compact-meta div { min-width: 0; }
      .compact-meta .label { color: #6b7280; font-size: 11px; line-height: 16px; }
      .compact-meta .value { font-size: 13px; line-height: 18px; font-weight: 600; overflow-wrap: anywhere; }
      .tab-strip { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 4px; scrollbar-width: none; }
      .tab-strip::-webkit-scrollbar { display: none; }
      .tab-strip button { flex: 0 0 auto; white-space: nowrap; }
      .mobile-only { display: block; }
      .mobile-app { display: flex; min-height: 100vh; flex-direction: column; background: #0d1119; color: #111827; }
      .mobile-topbar { padding: 14px 18px 8px; color: #e5e7eb; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .mobile-kicker { color: #8fa0b7; font-size: 11px; line-height: 16px; font-weight: 700; }
      .mobile-date { color: #cbd5e1; font-weight: 700; letter-spacing: 0; }
      .market-pill { margin-left: 6px; font-size: 12px; color: #35b36b; }
      .account-select { min-height: 32px; padding: 0 10px; color: #cbd5e1; font-size: 13px; text-decoration: none; border: 1px solid #303846; display: inline-flex; align-items: center; }
      .mobile-red-card { margin: 6px 12px 0; padding: 16px 16px 14px; color: #fff; background: linear-gradient(155deg, #f51d2f 0%, #d71326 72%, #b90f1f 100%); border-radius: 10px; box-shadow: 0 12px 30px rgba(190, 15, 31, 0.3); }
      .mobile-red-card .label { color: rgba(255,255,255,0.72); font-size: 12px; }
      .mobile-red-card .big { font-size: 24px; line-height: 30px; font-weight: 800; letter-spacing: 0; }
      .mobile-red-card .value { font-size: 16px; line-height: 22px; font-weight: 800; }
      .mobile-red-card .fine { color: rgba(255,255,255,0.74); font-size: 11px; }
      .mobile-red-grid { margin-top: 14px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
      .mobile-red-bottom { margin-top: 13px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.18); display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .mobile-content { flex: 1; margin-top: 12px; padding-bottom: 72px; background: #f3f5f8; border-radius: 18px 18px 0 0; overflow: hidden; }
      .mobile-panel { background: #fff; border-radius: 18px 18px 0 0; min-height: calc(100vh - 294px); }
      .mobile-panel-head { padding: 14px 18px 10px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid #edf0f4; }
      .mobile-panel-title { font-size: 18px; line-height: 24px; font-weight: 800; }
      .mobile-panel-sub { margin-top: 2px; color: #8a94a6; font-size: 12px; }
      .mobile-link { color: #8a94a6; font-size: 12px; white-space: nowrap; }
      .summary-grid { padding: 12px 14px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .summary-tile { padding: 12px; background: #f7f8fb; border: 1px solid #edf0f4; border-radius: 8px; }
      .summary-tile .label { color: #7b8494; font-size: 12px; }
      .summary-tile .value { margin-top: 4px; font-size: 20px; line-height: 24px; font-weight: 800; }
      .mobile-log-list { padding: 0 14px 14px; }
      .mobile-log-row { padding: 11px 0; border-top: 1px solid #edf0f4; display: flex; justify-content: space-between; gap: 12px; }
      .mobile-log-row .msg { font-size: 13px; line-height: 18px; font-weight: 700; }
      .mobile-log-row .meta { margin-top: 2px; color: #8a94a6; font-size: 11px; }
      .signal-row, .holding-row, .deal-row, .news-row { padding: 13px 18px; border-bottom: 1px solid #edf0f4; }
      .row-main { display: grid; grid-template-columns: minmax(82px, 0.9fr) minmax(0, 1.4fr) minmax(58px, auto); gap: 10px; align-items: start; }
      .stock-name { font-size: 16px; line-height: 20px; font-weight: 800; }
      .stock-code { color: #7b8494; font-size: 12px; line-height: 18px; }
      .tag-line { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
      .tag { padding: 2px 6px; border-radius: 3px; background: #f2f4f7; color: #667085; font-size: 11px; line-height: 16px; }
      .tag-red { background: #fff0f0; color: #d92331; }
      .row-desc { color: #3f4654; font-size: 13px; line-height: 18px; }
      .score-buy { color: #e11d2e; font-size: 18px; line-height: 22px; font-weight: 900; text-align: right; }
      .score-sell { color: #747d8d; font-size: 11px; line-height: 16px; text-align: right; }
      .mini-metrics { margin-top: 9px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; color: #7b8494; font-size: 11px; }
      .mini-metrics strong { display: block; margin-top: 1px; color: #111827; font-size: 13px; }
      .holding-row .row-main { grid-template-columns: minmax(92px, 1fr) minmax(104px, 1fr) minmax(88px, auto); }
      .holding-mid { color: #7b8494; font-size: 12px; line-height: 18px; }
      .holding-mid strong { color: #111827; font-size: 13px; }
      .pnl-box { text-align: right; font-size: 13px; font-weight: 800; }
      .frozen-note { margin-top: 5px; color: #d97706; font-size: 11px; text-align: right; }
      .mobile-segment { padding: 12px 14px 0; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
      .mobile-segment::-webkit-scrollbar { display: none; }
      .mobile-segment button { flex: 0 0 auto; padding: 7px 11px; border: 1px solid #d8dde6; background: #fff; color: #4b5563; font-size: 12px; }
      .mobile-segment button.active { background: #151922; color: #fff; border-color: #151922; }
      .deal-row .row-main { grid-template-columns: minmax(92px, 1fr) minmax(86px, 0.8fr) minmax(96px, auto); }
      .news-row .row-main { grid-template-columns: minmax(58px, auto) minmax(0, 1fr) minmax(54px, auto); }
      .news-title { font-size: 14px; line-height: 19px; font-weight: 800; }
      .news-meta { color: #7b8494; font-size: 11px; line-height: 17px; }
      .mobile-tabbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 70; height: 64px; display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); background: #101620; border-top: 1px solid #252d39; }
      .mobile-tabbar button { color: #c8d0dc; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
      .mobile-tabbar .nav-icon { position: relative; width: 21px; height: 21px; display: block; }
      .nav-overview::before { content: ""; position: absolute; left: 3px; top: 3px; width: 6px; height: 6px; background: currentColor; box-shadow: 9px 0 0 currentColor, 0 9px 0 currentColor, 9px 9px 0 currentColor; }
      .nav-buy::before { content: ""; position: absolute; left: 6px; top: 4px; width: 9px; height: 9px; border-top: 2px solid currentColor; border-right: 2px solid currentColor; transform: rotate(-45deg); }
      .nav-buy::after { content: ""; position: absolute; left: 10px; top: 7px; width: 2px; height: 10px; background: currentColor; }
      .nav-position::before { content: ""; position: absolute; left: 4px; top: 4px; width: 13px; height: 3px; background: currentColor; box-shadow: 0 6px 0 currentColor, 0 12px 0 currentColor; }
      .nav-deals::before { content: ""; position: absolute; left: 4px; top: 3px; width: 13px; height: 15px; border: 2px solid currentColor; }
      .nav-deals::after { content: ""; position: absolute; left: 7px; top: 8px; width: 7px; height: 2px; background: currentColor; box-shadow: 0 4px 0 currentColor; }
      .nav-news::before { content: ""; position: absolute; left: 5px; top: 3px; width: 12px; height: 15px; border: 2px solid currentColor; border-top-right-radius: 4px; }
      .nav-news::after { content: ""; position: absolute; left: 8px; top: 8px; width: 6px; height: 2px; background: currentColor; box-shadow: 0 4px 0 currentColor; }
      .nav-strategy::before { content: ""; position: absolute; left: 3px; top: 4px; width: 15px; height: 13px; border: 2px solid currentColor; }
      .nav-strategy::after { content: ""; position: absolute; left: 7px; top: 8px; width: 7px; height: 2px; background: currentColor; box-shadow: 0 4px 0 currentColor; }
      .mobile-tabbar button.active { background: #dc1728; color: #fff; }
      .desktop-only { display: none !important; }
      .mobile-page:not(.active-mobile) { display: none !important; }
    }
    @media (max-width: 420px) {
      .main-shell { padding-left: 10px; padding-right: 10px; }
      .table-wrap table { min-width: 660px; }
    }
  </style>
</head>
<body class="bg-[#eef1f5] text-neutral-900 min-h-screen">
  <div id="app" v-cloak class="min-h-screen">
    <div v-if="!authReady" class="min-h-screen flex items-center justify-center bg-[#eef1f5] text-sm text-neutral-500">正在检查登陆状态...</div>
    <template v-else>
    <div v-if="auth.visible" class="fixed inset-0 z-[120] bg-black/40 flex items-center justify-center p-4">
      <form @submit.prevent="auth.mode === 'register' ? registerFrontend() : loginFrontend()" class="w-full max-w-sm bg-white border border-neutral-300 p-5 space-y-4 shadow-xl">
        <div>
          <h1 class="text-xl font-semibold">{{ auth.mode === 'register' ? '注册用户' : '登陆' }}</h1>
          <p class="mt-1 text-sm text-neutral-500">输入用户名和密码即可使用。概览和新闻无需登陆。</p>
        </div>
        <label class="block text-sm">
          <span class="block text-xs text-neutral-500 mb-1">用户名</span>
          <input v-model="auth.username" autocomplete="username" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
        </label>
        <label class="block text-sm">
          <span class="block text-xs text-neutral-500 mb-1">密码</span>
          <input v-model="auth.password" type="password" autocomplete="current-password" class="w-full h-10 px-3 border border-neutral-300 outline-none focus:border-neutral-900">
        </label>
        <div v-if="auth.error" class="text-sm text-red-700">{{ auth.error }}</div>
        <button type="submit" :disabled="auth.loading" class="w-full h-10 bg-neutral-900 text-white text-sm disabled:opacity-50">{{ auth.loading ? '处理中' : (auth.mode === 'register' ? '注册并登陆' : '登陆') }}</button>
        <div class="grid grid-cols-2 gap-2 text-sm">
          <button type="button" @click="auth.mode = auth.mode === 'register' ? 'login' : 'register'; auth.error = ''" class="h-9 border border-neutral-300 bg-white">{{ auth.mode === 'register' ? '已有账号登陆' : '注册新用户' }}</button>
          <button type="button" @click="auth.visible = false" class="h-9 border border-neutral-300 bg-white">先看概览</button>
        </div>
      </form>
    </div>
    <div class="mobile-app">
      <div class="mobile-topbar">
        <div>
          <div class="mobile-kicker">{{ displayUser }} · {{ clockText || '--:--' }} · 情绪{{ marketMood.label || '中性' }}</div>
          <span class="mobile-date">{{ accountView.as_of || asOf || '-' }}</span>
          <span class="market-pill">{{ scheduler.market_open ? '交易中' : '休市' }}</span>
        </div>
        <div class="flex items-center gap-2">
          <button v-if="isLoggedIn" @click="logout" class="account-select">退出</button>
          <button v-else @click="openAuth('login')" class="account-select">登陆/注册</button>
        </div>
      </div>

      <section class="mobile-red-card">
        <template v-if="isLoggedIn">
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="label">总资产(元)</div>
            <div class="big">{{ money(account.total_asset) }}</div>
            <div class="fine">模拟资金 {{ money(userProfile.simulated_cash) }}</div>
          </div>
          <div class="text-right">
            <div class="label">跟随 {{ followedModelName }}</div>
            <div class="value">{{ signedMoney(account.total_pnl) }} ({{ signedPct(account.return_pct) }})</div>
          </div>
        </div>
        <div class="mobile-red-grid">
          <div>
            <div class="label">可用资金</div>
            <div class="value">{{ money(account.available_cash) }}</div>
          </div>
          <div>
            <div class="label">持仓市值</div>
            <div class="value">{{ money(account.market_value) }}</div>
          </div>
          <div>
            <div class="label">浮动盈亏</div>
            <div class="value">{{ signedMoney(account.unrealized_pnl) }}</div>
          </div>
        </div>
        <div class="mobile-red-bottom">
          <div>
            <div class="label">今日成交/持仓</div>
            <div class="big">{{ todayDeals.length }} / {{ positions.length }}</div>
          </div>
          <div>
            <div class="label">T+1冻结</div>
            <div class="big">{{ money(frozenMarketValue) }}</div>
          </div>
        </div>
        </template>
        <template v-else>
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="label">市场情绪</div>
            <div class="big">{{ marketMood.label || '中性' }}</div>
          </div>
          <div class="text-right">
            <div class="label">情绪分</div>
            <div class="value">{{ fixed(marketMood.score, 3) }}</div>
          </div>
        </div>
        <div class="mobile-red-grid">
          <div>
            <div class="label">最新新闻</div>
            <div class="value">{{ latestNewsCount }}</div>
          </div>
          <div>
            <div class="label">利好/利空</div>
            <div class="value">{{ marketMood.positive_count || 0 }} / {{ marketMood.negative_count || 0 }}</div>
          </div>
          <div>
            <div class="label">交易时段</div>
            <div class="value">{{ scheduler.market_open ? '交易中' : '休市' }}</div>
          </div>
        </div>
        <div class="mobile-red-bottom">
          <div>
            <div class="label">当前用户</div>
            <div class="big">游客</div>
          </div>
          <div>
            <div class="label">数据日期</div>
            <div class="big">{{ dataDate || asOf || '-' }}</div>
          </div>
        </div>
        </template>
      </section>

      <main class="mobile-content">
        <section v-show="mobileView === 'overview'" class="mobile-panel">
          <div class="mobile-panel-head">
            <div>
              <div class="mobile-panel-title">今日动作摘要</div>
              <div class="mobile-panel-sub">概览只显示摘要，完整信号进入对应页面</div>
            </div>
            <button class="mobile-link" @click="loadAll">刷新</button>
          </div>
          <div class="summary-grid">
            <button class="summary-tile text-left" @click="setMobileView('buy')">
              <div class="label">买入信号</div>
              <div class="value text-red-600">{{ buySignalCount }}</div>
            </button>
            <button class="summary-tile text-left" @click="setMobileView('deals')">
              <div class="label">卖出触发</div>
              <div class="value text-green-700">{{ todaySellCount }}</div>
            </button>
            <button class="summary-tile text-left" @click="setMobileView('positions')">
              <div class="label">持仓预警</div>
              <div class="value text-orange-700">{{ warningPositionCount }}</div>
            </button>
            <button class="summary-tile text-left" @click="setMobileView('news')">
              <div class="label">最新新闻</div>
              <div class="value">{{ latestNewsCount }}</div>
            </button>
            <button class="summary-tile text-left" @click="setMobileView('strategy')">
              <div class="label">策略模型</div>
              <div class="value">{{ strategyItems.length }}</div>
            </button>
          </div>
          <div class="mobile-panel-head border-t border-neutral-100">
            <div>
              <div class="mobile-panel-title">系统运行</div>
              <div class="mobile-panel-sub">新闻抓取、行情同步、AI分析和交易循环</div>
            </div>
            <span class="mobile-link">{{ scheduler.status || '-' }}</span>
          </div>
          <div class="summary-grid">
            <div class="summary-tile">
              <div class="label">交易时段</div>
              <div class="value text-base" :class="scheduler.market_open ? 'text-red-600' : 'text-neutral-800'">{{ scheduler.market_open ? '开盘' : '休市' }}</div>
            </div>
            <div class="summary-tile">
              <div class="label">下次新闻</div>
              <div class="value text-base">{{ shortTime(scheduler.next_news_fetch_at) }}</div>
            </div>
          </div>
          <div class="mobile-log-list">
            <div v-for="item in recentLogs" :key="`m-${item.ts}-${item.job}-${item.message}`" class="mobile-log-row">
              <div>
                <div class="msg">{{ item.message || '-' }}</div>
                <div class="meta">{{ item.job || 'system' }} · {{ item.stage || '-' }}</div>
              </div>
              <div class="meta shrink-0">{{ shortTime(item.ts) }}</div>
            </div>
            <div v-if="!recentLogs.length" class="mobile-log-row text-neutral-500 text-sm">暂无运行日志</div>
          </div>
        </section>

        <section v-if="isLoggedIn" v-show="mobileView === 'buy'" class="mobile-panel">
          <div class="mobile-panel-head">
            <div>
              <div class="mobile-panel-title">买入信号</div>
              <div class="mobile-panel-sub">买入阈值 {{ fixed(rules.buy_threshold) }} · 单票资金 {{ money(rules.paper_position_value) }}</div>
            </div>
            <span class="mobile-link">候选 {{ buyList.length }}</span>
          </div>
          <article v-for="item in buyList" :key="'m-buy-' + item.code" class="signal-row">
            <div class="row-main">
              <div>
                <div class="stock-name">{{ item.name }}</div>
                <div class="stock-code">{{ item.code }}</div>
                <div class="tag-line">
                  <span class="tag">{{ item.industry || '-' }}</span>
                  <span class="tag tag-red">新闻 {{ item.event_count || 0 }}</span>
                </div>
              </div>
              <div>
                <div class="row-desc line-clamp-2">{{ item.reason || '-' }}</div>
                <div class="mini-metrics">
                  <span>情绪<strong>{{ fixed((item.components || {}).sentiment_score) }}</strong></span>
                  <span>事件<strong>{{ fixed((item.components || {}).event_score) }}</strong></span>
                  <span>风控<strong>{{ fixed((item.components || {}).risk_score) }}</strong></span>
                </div>
              </div>
              <div>
                <div class="score-buy">买 {{ fixed(item.buy_score) }}</div>
                <div class="score-sell">卖 {{ fixed(item.sell_score) }}</div>
                <div class="score-sell mt-2">{{ item.event_type || '事件' }}</div>
              </div>
            </div>
          </article>
          <div v-if="!buyList.length" class="p-10 text-center text-neutral-500 text-sm">这一天没有达到买入阈值的股票</div>
        </section>

        <section v-if="isLoggedIn" v-show="mobileView === 'positions'" class="mobile-panel">
          <div class="mobile-panel-head">
            <div>
              <div class="mobile-panel-title">持仓 {{ positions.length }}</div>
              <div class="mobile-panel-sub">分时估值 · A股T+1可用数量</div>
            </div>
            <button class="mobile-link" @click="loadMarketData(true)">刷新</button>
          </div>
          <article v-for="pos in positions" :key="'m-pos-' + pos.code" class="holding-row">
            <div class="row-main">
              <div>
                <div class="stock-name">{{ pos.name }}</div>
                <div class="stock-code">{{ pos.code }}</div>
                <div class="stock-code">分时估值 {{ shortTime(pos.last_time || pos.last_date) }}</div>
              </div>
              <div class="holding-mid">
                <div>持仓/可用 <strong>{{ qty(pos.qty) }} / {{ qty(pos.available_qty) }}</strong></div>
                <div>成本/现价 <strong>{{ fixed(pos.cost_price, 3) }} / {{ fixed(pos.last_price, 3) }}</strong></div>
                <div>市值 <strong>{{ money(pos.market_value) }}</strong></div>
              </div>

              <div class="font-semibold">{{ day.date }}</div>
              <div class="text-xs text-neutral-500">
                信号 {{ day.signal_count }}，已卖 {{ day.sold_count }}，持仓 {{ day.holding_count }}，已卖平均收益
                <span :class="numClass(day.avg_sold_pnl_pct)">{{ pct(day.avg_sold_pnl_pct) }}</span>
              </div>
            </div>
            <div class="table-wrap overflow-auto">
              <table class="w-full text-sm">
                <thead class="bg-neutral-100 border-b border-neutral-300 text-xs text-neutral-600">
                  <tr>
                    <th class="text-left px-3 py-2">证券</th>
                    <th class="text-right px-3 py-2">评分</th>
                    <th class="text-left px-3 py-2">计划买入</th>
                    <th class="text-left px-3 py-2">实际买入</th>
                    <th class="text-left px-3 py-2">卖出</th>
                    <th class="text-right px-3 py-2">收益</th>
                    <th class="text-left px-3 py-2">状态</th>
                    <th class="text-left px-3 py-2 min-w-[300px]">逻辑</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="sig in day.signals" :key="day.date + sig.code" class="border-b border-neutral-100 hover:bg-neutral-50">
                    <td class="px-3 py-2">{{ sig.name }} <span class="text-xs text-neutral-500">{{ sig.code }}</span></td>
                    <td class="px-3 py-2 text-right text-red-600 font-semibold">{{ fixed(sig.buy_score) }}</td>
                    <td class="px-3 py-2">{{ sig.execute_on || '-' }}</td>
                    <td class="px-3 py-2">{{ (sig.outcome || {}).buy_date || '-' }} <span class="text-xs text-neutral-500">{{ fixed((sig.outcome || {}).buy_price) }}</span></td>
                    <td class="px-3 py-2">{{ (sig.outcome || {}).sell_date || '-' }} <span class="text-xs text-neutral-500">{{ fixed((sig.outcome || {}).sell_price || (sig.outcome || {}).last_price) }}</span></td>
                    <td class="px-3 py-2 text-right font-semibold" :class="numClass((sig.outcome || {}).pnl_pct)">{{ (sig.outcome || {}).status ? pct((sig.outcome || {}).pnl_pct) : '-' }}</td>
                    <td class="px-3 py-2">
                      <span class="px-2 py-1 text-xs" :class="statusClass((sig.outcome || {}).status)">
                        {{ (sig.outcome || {}).status || '待执行' }}
                      </span>
                    </td>
                    <td class="px-3 py-2">
                      <div class="line-clamp-2">{{ sig.reason }}</div>
                      <div v-if="(sig.outcome || {}).unfilled_reason" class="text-xs text-orange-700 mt-1">{{ sig.outcome.unfilled_reason }}</div>
                      <div v-if="(sig.outcome || {}).sell_reason" class="text-xs text-neutral-500 mt-1">卖出：{{ sig.outcome.sell_reason }}</div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <div v-if="!historyDays.length" class="p-10 text-center text-neutral-500">暂无历史买入信号</div>
        </div>
      </section>
    </main>

    </template>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          asOf: '',
          clockText: '',
          clockTimer: null,
          authReady: false,
          auth: {
            token: localStorage.getItem('qt_front_token') || '',
            username: localStorage.getItem('qt_front_username') || '',
            password: '',
            loading: false,
            error: '',
            setupRequired: false,
            visible: false,
            mode: 'login',
          },
          loading: false,
          syncing: false,
          activeTab: 'deals',
          mobileView: 'overview',
          newsFilter: 'impact',
          plan: {},
          accountView: {},
          status: {},
          jobStatus: {},
          jobLogs: {},
          recommendations: {},
          strategyModels: {},
          userProfile: { simulated_cash: 200000, strategy_model_id: 'active' },
          profileForm: { simulated_cash: 200000, strategy_model_id: 'active' },
          followedModel: {},
          profileSaving: false,
          profileMessage: '',
          marketSentiment: {},
          newsFeed: {},
          syncResult: {},
          tabs: [
            { key: 'deals', label: '历史成交' },
            { key: 'delivery', label: '交割单' },
            { key: 'history', label: '历史计划收益' },
          ],
        };
      },
      computed: {
        isLoggedIn() { return Boolean(this.auth.token); },
        displayUser() { return this.isLoggedIn ? (this.auth.username || '已登陆') : '游客'; },
        marketMood() { return this.marketSentiment || {}; },
        account() { return this.accountView.account || {}; },
        scheduler() { return this.jobStatus.scheduler || {}; },
        recentLogs() { return (this.jobLogs.items || []).slice(0, 3); },
        dataDate() { return this.status.data_date || this.status.latest_event_date || ''; },
        latestNews() { return this.newsFeed.items || []; },
        structuredEvents() { return this.newsFeed.events || []; },
        positions() { return this.accountView.positions || []; },
        todayDeals() { return this.accountView.today_deals || []; },
        historyDeals() { return this.accountView.history_deals || []; },
        deliveryRecords() { return this.accountView.delivery_records || []; },
        frozenMarketValue() {
          return this.positions.reduce((sum, pos) => sum + Number(pos.frozen_qty || 0) * Number(pos.last_price || 0), 0);
        },
        buySignalCount() {
          const items = this.recommendations.items || this.plan.buy_list || [];
          return items.filter(item => String(item.action || '买入').includes('买入') || Number(item.buy_score || 0) >= Number(this.rules.buy_threshold || 72)).length;
        },
        todaySellCount() {
          return this.todayDeals.filter(deal => deal.side === 'SELL').length;
        },
        warningPositionCount() {
          return this.positions.filter(pos => Number(pos.pnl_pct || 0) < -3 || Number(pos.frozen_qty || 0) > 0).length;
        },
        latestNewsCount() {
          const byDate = (((this.status.jobs || {}).news_fetcher || {}).recent_dates || {})[this.asOf];
          return Number(this.newsFeed.count || this.latestNews.length || byDate || this.status.news_count || this.status.latest_news_count || 0);
        },
        mobileEventList() {
          const fallbackEvents = (this.recommendations.items || []).flatMap(item => item.events || []);
          const events = (this.structuredEvents || []).length ? this.structuredEvents : fallbackEvents;
          return events
            .slice()
            .sort((a, b) => Number(b.impact_score || 0) - Number(a.impact_score || 0))
            .slice(0, 12);
        },
        filteredMobileEventList() {
          const items = this.mobileEventList;
          if (this.newsFilter === 'positive') {
            return items.filter(event => Number(event.sentiment || 0) >= 0);
          }
          if (this.newsFilter === 'negative') {
            return items.filter(event => Number(event.sentiment || 0) < 0);
          }
          if (this.newsFilter === 'linked') {
            return items.filter(event => event.code || event.name);
          }
          return items.filter(event => Number(event.impact_score || 0) >= 70).length
            ? items.filter(event => Number(event.impact_score || 0) >= 70)
            : items;
        },
        buyList() {
          const planned = this.plan.buy_list || [];
          const sample = item => ['600001', '600002'].includes(String((item || {}).code || '').trim()) || JSON.stringify(item || {}).includes('样例');
          const items = (planned.length ? planned : ((this.recommendations.items || []).filter(item => String(item.action || '').includes('买入'))))
            .filter(item => !sample(item));
          const mobileLimit = Math.max(3, Number(this.rules.top_n || 5));
          return window.innerWidth <= 767 ? items.slice(0, mobileLimit) : items;
        },
        historyDays() { return this.plan.history_days || []; },
        strategyItems() {
          const items = [];
          if (this.strategyModels.active) items.push({ ...this.strategyModels.active, id: this.strategyModels.active.id || 'active', rank: '当前' });
          for (const item of (this.strategyModels.items || [])) items.push(item);
          const seen = new Set();
          return items.filter(item => {
            const id = String((item || {}).id || '');
            if (!id || seen.has(id)) return false;
            seen.add(id);
            return true;
          });
        },
        followedModelName() {
          const id = String(this.userProfile.strategy_model_id || 'active');
          const model = this.strategyItems.find(item => String(item.id) === id) || this.followedModel || {};
          return model.name || model.id || '当前运行策略';
        },
        summary() { return this.plan.timeline_summary || {}; },
        rules() {
          return {
            ...(this.recommendations.strategy_params || {}),
            ...(this.plan.current_rules || {}),
          };
        },
      },
      mounted() {
        this.updateClock();
        this.clockTimer = window.setInterval(this.updateClock, 30000);
        this.asOf = this.localToday();
        const initialView = new URLSearchParams(window.location.search).get('view');
        if (['overview', 'buy', 'positions', 'deals', 'strategy', 'news'].includes(initialView)) {
          this.mobileView = initialView;
        }
        this.initAuth();
      },
      beforeUnmount() {
        if (this.clockTimer) window.clearInterval(this.clockTimer);
      },
      methods: {
        async api(url, options = {}) {
          const headers = new Headers(options.headers || {});
          if (this.auth.token) headers.set('Authorization', `Bearer ${this.auth.token}`);
          const res = await fetch(url, { ...options, headers });
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              this.auth.token = '';
              localStorage.removeItem('qt_front_token');
            }
            throw new Error(await res.text());
          }
          return await res.json();
        },
        async initAuth() {
          try {
            const res = await fetch('/api/auth/status');
            const status = await res.json();
            this.auth.setupRequired = Boolean(status.setup_required);
            await this.loadAll();
          } catch (err) {
            this.auth.error = String(err.message || err);
            this.auth.token = '';
            localStorage.removeItem('qt_front_token');
            await this.loadAll();
          } finally {
            if (!this.auth.token && !this.isPublicView(this.mobileView)) this.mobileView = 'overview';
            this.authReady = true;
          }
        },
        openAuth(mode = 'login') {
          this.auth.mode = mode;
          this.auth.error = '';
          this.auth.visible = true;
        },
        async loginFrontend() {
          this.auth.loading = true;
          this.auth.error = '';
          try {
            const result = await this.api('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                scope: 'frontend',
                username: this.auth.username,
                password: this.auth.password,
              }),
            });
            this.auth.token = result.token || '';
            this.auth.username = result.username || this.auth.username;
            localStorage.setItem('qt_front_token', this.auth.token);
            localStorage.setItem('qt_front_username', this.auth.username || '');
            this.auth.visible = false;
            this.auth.password = '';
            await this.loadAll();
          } catch (err) {
            this.auth.error = String(err.message || err);
          } finally {
            this.auth.loading = false;
          }
        },
        async registerFrontend() {
          this.auth.loading = true;
          this.auth.error = '';
          try {
            const result = await this.api('/api/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: this.auth.username,
                password: this.auth.password,
              }),
            });
            this.auth.token = result.token || '';
            this.auth.username = result.username || this.auth.username;
            localStorage.setItem('qt_front_token', this.auth.token);
            localStorage.setItem('qt_front_username', this.auth.username || '');
            this.auth.visible = false;
            this.auth.password = '';
            await this.loadAll();
          } catch (err) {
            this.auth.error = String(err.message || err);
          } finally {
            this.auth.loading = false;
          }
        },
        logout() {
          this.auth.token = '';
          this.auth.password = '';
          localStorage.removeItem('qt_front_token');
          localStorage.removeItem('qt_front_username');
          if (!this.isPublicView(this.mobileView)) this.mobileView = 'overview';
          this.loadAll();
        },
        isFollowing(model) {
          return String((model || {}).id || '') === String(this.userProfile.strategy_model_id || 'active');
        },
        async followStrategy(model) {
          if (!model || !model.id) return;
          this.profileForm.strategy_model_id = model.id;
          await this.saveProfile(model.id);
        },
        async saveProfile(modelId = null) {
          if (!this.isLoggedIn) return this.openAuth('login');
          this.profileSaving = true;
          this.profileMessage = '';
          try {
            const payload = {
              simulated_cash: Number(this.profileForm.simulated_cash || this.userProfile.simulated_cash || 200000),
              strategy_model_id: String(modelId || this.profileForm.strategy_model_id || this.userProfile.strategy_model_id || 'active'),
            };
            const result = await this.api('/api/front/profile', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            this.userProfile = { ...this.userProfile, ...(result.profile || {}) };
            this.profileForm = { ...this.profileForm, ...this.userProfile };
            this.profileMessage = '已保存';
            await this.loadAll();
          } catch (err) {
            this.profileMessage = String(err.message || err);
          } finally {
            this.profileSaving = false;
          }
        },
        async loadAll() {
          this.loading = true;
          try {
            const q = new URLSearchParams({ mobile: String(window.innerWidth <= 767) });
            if (this.asOf) q.set('as_of', this.asOf);
            let snapshotPath = '/api/front/public_snapshot';
            if (this.isLoggedIn) snapshotPath = '/api/front/snapshot';
            const snapshot = await this.api(`${snapshotPath}?${q.toString()}`);
            this.status = snapshot.status_payload || {};
            this.jobStatus = snapshot.jobs || {};
            this.jobLogs = snapshot.logs || {};
            this.accountView = snapshot.trading_account || {};
            this.newsFeed = snapshot.news || {};
            this.recommendations = snapshot.recommendations || {};
            this.strategyModels = snapshot.strategy_models || {};
            this.userProfile = { ...this.userProfile, ...(snapshot.frontend_profile || {}) };
            this.profileForm = { ...this.profileForm, ...this.userProfile };
            this.followedModel = snapshot.followed_model || {};
            this.marketSentiment = snapshot.market_sentiment || {};
            this.plan = snapshot.daily_plan || {};
            if (!this.asOf) this.asOf = this.accountView.as_of || this.plan.as_of || this.asOf;
          } finally {
            this.loading = false;
          }
        },
        async loadMarketData(quiet = false) {
          try {
            if (this.isLoggedIn) {
              await this.loadAll();
              return;
            }
            const date = this.asOf || '';
            const accountQuery = date ? `?as_of=${date}&limit=500` : '?limit=500';
            const account = await this.api(`/api/quant/trading_account${accountQuery}`);
            this.accountView = account;
            if (!this.asOf && account.as_of) this.asOf = account.as_of;
          } catch (err) {
            if (!quiet) throw err;
          }
        },
        async loadNews(quiet = false) {
          try {
            const date = this.asOf || '';
            const limit = window.innerWidth <= 767 ? 30 : 80;
            const newsQuery = date ? `?as_of=${date}&limit=${limit}` : `?limit=${limit}`;
            this.newsFeed = await this.api(`/api/quant/news${newsQuery}`);
          } catch (err) {
            if (!quiet) throw err;
          }
        },
        async loadPlan(quiet = false) {
          try {
            if (this.isLoggedIn) {
              await this.loadAll();
              return;
            }
            const date = this.asOf || '';
            const planQuery = date ? `?as_of=${date}&limit_days=120` : '?limit_days=120';
            const plan = await this.api(`/api/quant/daily_plan${planQuery}`);
            this.plan = plan;
            if (!this.asOf && plan.as_of) this.asOf = plan.as_of;
          } catch (err) {
            if (!quiet) throw err;
          }
        },
        async loadRecommendations(quiet = false) {
          try {
            if (this.isLoggedIn) {
              await this.loadAll();
              return;
            }
            const q = new URLSearchParams({ lookback_days: '2', top_n: window.innerWidth <= 767 ? '12' : '30' });
            if (this.asOf) q.set('as_of', this.asOf);
            this.recommendations = await this.api(`/api/quant/recommendations?${q.toString()}`);
          } catch (err) {
            if (!quiet) throw err;
          }
        },
        async syncIntraday() {
          this.syncing = true;
          try {
            const date = this.asOf || this.plan.as_of || '';
            const q = date ? `?date=${date}&source=events&max_codes=200` : '?source=events&max_codes=200';
            this.syncResult = await this.api(`/api/data/biying/sync_intraday${q}`, { method: 'POST' });
            await this.loadAll();
          } finally {
            this.syncing = false;
          }
        },
        setMobileView(view) {
          if (!this.isPublicView(view) && !this.auth.token) {
            this.openAuth('login');
            return;
          }
          this.mobileView = view;
          if (view === 'overview' && this.auth.token && !this.recommendations.items) this.loadRecommendations(true);
          if (view === 'overview' && !this.newsFeed.items) this.loadNews(true);
          if (view === 'buy' && !this.recommendations.items) this.loadRecommendations(true);
          if (view === 'buy' && !this.plan.as_of) this.loadPlan(true);
          if (view === 'strategy' && !this.strategyModels.items) this.loadAll();
          if (view === 'news' && !this.newsFeed.items) this.loadNews(true);
          if (view === 'news' && this.auth.token && !this.recommendations.items) this.loadRecommendations(true);
          if (view === 'deals') this.activeTab = 'deals';
        },
        isPublicView(view) {
          return ['overview', 'news'].includes(String(view || ''));
        },
        updateClock() {
          this.clockText = new Intl.DateTimeFormat('zh-CN', {
            timeZone: 'Asia/Shanghai',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
          }).format(new Date());
        },
        localToday() {
          const parts = new Intl.DateTimeFormat('zh-CN', {
            timeZone: 'Asia/Shanghai',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
          }).formatToParts(new Date()).reduce((acc, part) => {
            acc[part.type] = part.value;
            return acc;
          }, {});
          return `${parts.year}-${parts.month}-${parts.day}`;
        },
        shortTime(value) {
          const text = String(value || '');
          if (!text) return '-';
          return text.length >= 16 ? text.slice(5, 16).replace('T', ' ') : text;
        },
        fixed(value, digits = 2) {
          const n = Number(value || 0);
          return Number.isFinite(n) ? n.toFixed(digits) : '-';
        },
        pct(value) {
          return `${this.fixed(value)}%`;
        },
        signedMoney(value) {
          const n = Number(value || 0);
          if (!Number.isFinite(n)) return '-';
          const text = Math.abs(n).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return `${n > 0 ? '+' : n < 0 ? '-' : ''}${text}`;
        },
        signedPct(value) {
          const n = Number(value || 0);
          if (!Number.isFinite(n)) return '-';
          return `${n > 0 ? '+' : n < 0 ? '-' : ''}${Math.abs(n).toFixed(2)}%`;
        },
        money(value) {
          const n = Number(value || 0);
          return Number.isFinite(n) ? n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-';
        },
        qty(value) {
          const n = Number(value || 0);
          return Number.isFinite(n) ? n.toLocaleString('zh-CN', { maximumFractionDigits: 2 }) : '-';
        },
        numClass(value) {
          const n = Number(value || 0);
          if (n > 0) return 'text-red-600';
          if (n < 0) return 'text-green-700';
          return 'text-neutral-700';
        },
        sideClass(side) {
          return side === 'BUY' ? 'text-red-600' : 'text-green-700';
        },
        statusClass(status) {
          if (status === '已卖出') return 'bg-neutral-900 text-white';
          if (status === '持仓中') return 'bg-red-100 text-red-700';
          if (status === '未成交') return 'bg-orange-100 text-orange-700';
          return 'bg-neutral-100 text-neutral-600';
        },
      },
    }).mount('#app');
  </script>
</body>
</html>
